AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Auto Scaling Lab - Highly available, auto-scaling web tier using EC2 Auto Scaling
  and an Application Load Balancer (ALB). Includes VPC, public/private subnets across
  2 AZs, NAT Gateway, ALB, Target Group, Launch Template, ASG, and scaling policies.

# =============================================================================
# PARAMETERS
# =============================================================================
Parameters:
  EnvironmentName:
    Type: String
    Default: AutoScalingLab
    Description: Name prefix for all resources

  InstanceType:
    Type: String
    Default: t3.micro
    AllowedValues:
      - t3.micro
      - t3.small
      - t3.medium
    Description: EC2 instance type (t3.micro is free-tier eligible)

  VpcCIDR:
    Type: String
    Default: 10.0.0.0/16
    Description: CIDR block for the VPC

  PublicSubnet1CIDR:
    Type: String
    Default: 10.0.1.0/24

  PublicSubnet2CIDR:
    Type: String
    Default: 10.0.2.0/24

  PrivateSubnet1CIDR:
    Type: String
    Default: 10.0.3.0/24

  PrivateSubnet2CIDR:
    Type: String
    Default: 10.0.4.0/24

  ASGMinSize:
    Type: Number
    Default: 1
    Description: Minimum number of instances in the ASG

  ASGDesiredCapacity:
    Type: Number
    Default: 1
    Description: Desired number of instances in the ASG

  ASGMaxSize:
    Type: Number
    Default: 4
    Description: Maximum number of instances in the ASG

  CPUScalingTarget:
    Type: Number
    Default: 30
    Description: Target CPU utilization (%) to trigger scale-out

# =============================================================================
# RESOURCES
# =============================================================================
Resources:

  # ---------------------------------------------------------------------------
  # VPC
  # ---------------------------------------------------------------------------
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCIDR
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-VPC"

  # ---------------------------------------------------------------------------
  # INTERNET GATEWAY
  # ---------------------------------------------------------------------------
  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-IGW"

  InternetGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  # ---------------------------------------------------------------------------
  # SUBNETS
  # ---------------------------------------------------------------------------
  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PublicSubnet1CIDR
      AvailabilityZone: !Select [0, !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-PublicSubnet-AZ1"

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PublicSubnet2CIDR
      AvailabilityZone: !Select [1, !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-PublicSubnet-AZ2"

  PrivateSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PrivateSubnet1CIDR
      AvailabilityZone: !Select [0, !GetAZs ""]
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-PrivateSubnet-AZ1"

  PrivateSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PrivateSubnet2CIDR
      AvailabilityZone: !Select [1, !GetAZs ""]
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-PrivateSubnet-AZ2"

  # ---------------------------------------------------------------------------
  # NAT GATEWAY (Regional - in PublicSubnet1)
  # ---------------------------------------------------------------------------
  NatGatewayEIP:
    Type: AWS::EC2::EIP
    DependsOn: InternetGatewayAttachment
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-NatGateway-EIP"

  NatGateway:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NatGatewayEIP.AllocationId
      SubnetId: !Ref PublicSubnet1
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-NatGateway"

  # ---------------------------------------------------------------------------
  # ROUTE TABLES
  # ---------------------------------------------------------------------------

  # Public Route Table -> Internet Gateway
  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-PublicRouteTable"

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: InternetGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet1
      RouteTableId: !Ref PublicRouteTable

  PublicSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet2
      RouteTableId: !Ref PublicRouteTable

  # Private Route Table -> NAT Gateway
  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-PrivateRouteTable"

  PrivateRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGateway

  PrivateSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet1
      RouteTableId: !Ref PrivateRouteTable

  PrivateSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet2
      RouteTableId: !Ref PrivateRouteTable

  # ---------------------------------------------------------------------------
  # SECURITY GROUPS
  # ---------------------------------------------------------------------------

  # ALB Security Group - allows HTTP from the internet
  ALBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow HTTP traffic to the ALB from the internet
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          Description: Allow HTTP from internet
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
          Description: Allow all outbound
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-ALB-SG"

  # EC2 Security Group - only allows traffic from the ALB (no direct internet, no SSH)
  EC2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow HTTP only from ALB. No SSH. No direct internet access.
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          SourceSecurityGroupId: !Ref ALBSecurityGroup
          Description: Allow HTTP from ALB only
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
          Description: Allow all outbound (for NAT Gateway to reach internet)
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-EC2-SG"

  # ---------------------------------------------------------------------------
  # IAM ROLE FOR EC2 (SSM access for stress testing demo - no SSH needed)
  # ---------------------------------------------------------------------------
  EC2InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${EnvironmentName}-EC2-SSM-Role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-EC2-SSM-Role"

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: !Sub "${EnvironmentName}-EC2-InstanceProfile"
      Roles:
        - !Ref EC2InstanceRole

  # ---------------------------------------------------------------------------
  # APPLICATION LOAD BALANCER
  # ---------------------------------------------------------------------------
  ALB:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub "${EnvironmentName}-ALB"
      Type: application
      Scheme: internet-facing
      Subnets:
        - !Ref PublicSubnet1
        - !Ref PublicSubnet2
      SecurityGroups:
        - !Ref ALBSecurityGroup
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-ALB"

  # Target Group - EC2 instances register here
  ALBTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub "${EnvironmentName}-TG"
      Port: 80
      Protocol: HTTP
      VpcId: !Ref VPC
      TargetType: instance
      HealthCheckProtocol: HTTP
      HealthCheckPath: /
      HealthCheckPort: traffic-port
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-TargetGroup"

  # ALB Listener - routes HTTP:80 traffic to the Target Group
  ALBListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ALB
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref ALBTargetGroup

  # ---------------------------------------------------------------------------
  # LAUNCH TEMPLATE
  # The User Data script installs Apache and creates a web page
  # displaying the instance ID and AZ for demo purposes.
  # ---------------------------------------------------------------------------
  LaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateName: !Sub "${EnvironmentName}-LaunchTemplate"
      LaunchTemplateData:
        ImageId: "{{resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64}}"
        InstanceType: !Ref InstanceType
        IamInstanceProfile:
          Arn: !GetAtt EC2InstanceProfile.Arn
        SecurityGroupIds:
          - !Ref EC2SecurityGroup
        # No KeyName = no SSH access (as required)
        UserData:
          Fn::Base64: !Sub |
            #!/bin/bash
            set -e
            # Update packages
            dnf update -y
            # Install Apache HTTP Server
            dnf install -y httpd stress
            # Start and enable Apache
            systemctl start httpd
            systemctl enable httpd
            # Fetch instance metadata
            TOKEN=$(curl -sX PUT "http://169.254.169.254/latest/api/token" \
              -H "X-aws-ec2-metadata-token-ttl-seconds: 21600")
            INSTANCE_ID=$(curl -s -H "X-aws-ec2-metadata-token: $TOKEN" \
              http://169.254.169.254/latest/meta-data/instance-id)
            AZ=$(curl -s -H "X-aws-ec2-metadata-token: $TOKEN" \
              http://169.254.169.254/latest/meta-data/placement/availability-zone)
            PRIVATE_IP=$(curl -s -H "X-aws-ec2-metadata-token: $TOKEN" \
              http://169.254.169.254/latest/meta-data/local-ipv4)
            LAUNCH_TIME=$(date -u '+%Y-%m-%d %H:%M:%S UTC')
            # Write the web page
            cat > /var/www/html/index.html << EOF
            <!DOCTYPE html>
            <html lang="en">
            <head>
              <meta charset="UTF-8">
              <meta http-equiv="refresh" content="10">
              <title>Auto Scaling Demo</title>
              <style>
                body { font-family: 'Segoe UI', Arial, sans-serif; background: #f4f6f8;
                       display: flex; justify-content: center; align-items: center;
                       min-height: 100vh; margin: 0; }
                .card { background: white; border-radius: 12px; padding: 40px 50px;
                        box-shadow: 0 4px 20px rgba(0,0,0,0.1); max-width: 520px; width: 100%; }
                h1 { color: #232f3e; margin-bottom: 8px; font-size: 1.8rem; }
                .subtitle { color: #ff9900; font-weight: bold; margin-bottom: 30px; font-size: 1rem; }
                .info-row { display: flex; justify-content: space-between; padding: 12px 0;
                            border-bottom: 1px solid #eee; font-size: 0.95rem; }
                .info-row:last-child { border-bottom: none; }
                .label { color: #666; font-weight: 600; }
                .value { color: #232f3e; font-family: monospace; font-size: 0.9rem; }
                .badge { background: #e8f5e9; color: #2e7d32; padding: 4px 10px;
                         border-radius: 20px; font-size: 0.8rem; font-weight: bold; }
              </style>
            </head>
            <body>
              <div class="card">
                <h1>&#9889; Auto Scaling Demo</h1>
                <p class="subtitle">AWS EC2 Auto Scaling + Application Load Balancer</p>
                <div class="info-row">
                  <span class="label">Instance ID</span>
                  <span class="value">$INSTANCE_ID</span>
                </div>
                <div class="info-row">
                  <span class="label">Availability Zone</span>
                  <span class="value">$AZ</span>
                </div>
                <div class="info-row">
                  <span class="label">Private IP</span>
                  <span class="value">$PRIVATE_IP</span>
                </div>
                <div class="info-row">
                  <span class="label">Launched At</span>
                  <span class="value">$LAUNCH_TIME</span>
                </div>
                <div class="info-row">
                  <span class="label">Status</span>
                  <span class="badge">&#10003; Healthy</span>
                </div>
                <p style="margin-top:20px; color:#999; font-size:0.75rem; text-align:center;">
                  Page auto-refreshes every 10 seconds &mdash; refresh to see different instances
                </p>
              </div>
            </body>
            </html>
            EOF
        TagSpecifications:
          - ResourceType: instance
            Tags:
              - Key: Name
                Value: !Sub "${EnvironmentName}-WebServer"

  # ---------------------------------------------------------------------------
  # AUTO SCALING GROUP
  # ---------------------------------------------------------------------------
  AutoScalingGroup:
    Type: AWS::AutoScaling::AutoScalingGroup
    DependsOn: NatGateway
    Properties:
      AutoScalingGroupName: !Sub "${EnvironmentName}-ASG"
      MinSize: !Sub "${ASGMinSize}"
      MaxSize: !Sub "${ASGMaxSize}"
      DesiredCapacity: !Sub "${ASGDesiredCapacity}"
      LaunchTemplate:
        LaunchTemplateId: !Ref LaunchTemplate
        Version: !GetAtt LaunchTemplate.LatestVersionNumber
      VPCZoneIdentifier:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2
      TargetGroupARNs:
        - !Ref ALBTargetGroup
      HealthCheckType: ELB
      HealthCheckGracePeriod: 300
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-ASG-Instance"
          PropagateAtLaunch: true

  # ---------------------------------------------------------------------------
  # SCALING POLICY - Target Tracking on CPU Utilization
  # Triggers scale-out when average CPU > 30%
  # ---------------------------------------------------------------------------
  CPUScalingPolicy:
    Type: AWS::AutoScaling::ScalingPolicy
    Properties:
      AutoScalingGroupName: !Ref AutoScalingGroup
      PolicyType: TargetTrackingScaling
      TargetTrackingConfiguration:
        PredefinedMetricSpecification:
          PredefinedMetricType: ASGAverageCPUUtilization
        TargetValue: !Ref CPUScalingTarget
        ScaleInCooldown: 300
        ScaleOutCooldown: 60  # Fast scale-out for demo purposes

# =============================================================================
# OUTPUTS
# =============================================================================
Outputs:
  VPCID:
    Description: VPC ID
    Value: !Ref VPC
    Export:
      Name: !Sub "${EnvironmentName}-VPCID"

  ALBDNSName:
    Description: Application Load Balancer DNS Name - use this URL to access the app
    Value: !Sub "http://${ALB.DNSName}"
    Export:
      Name: !Sub "${EnvironmentName}-ALB-DNS"

  ALBARNSuffix:
    Description: ALB ARN Suffix (for CloudWatch metrics)
    Value: !GetAtt ALB.LoadBalancerFullName

  TargetGroupARN:
    Description: Target Group ARN
    Value: !Ref ALBTargetGroup

  AutoScalingGroupName:
    Description: Auto Scaling Group Name
    Value: !Ref AutoScalingGroup

  NatGatewayEIP:
    Description: Elastic IP of the NAT Gateway
    Value: !Ref NatGatewayEIP
